<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000;
    }
    input {
      font-size: 24px;
      padding: 12px;
      width: 80%;
      border-radius: 12px;
      border: none;
      outline: none;
    }
  </style>
</head>
<body>
  <input id="url" placeholder="Enter URL..." autofocus>

  <script>
    const input = document.getElementById("url");

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        let url = input.value.trim();

        // If no protocol, assume http (works for local IPs)
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          url = "http://" + url;
        }

        window.location.href = url;
      }
    });
  </script>
</body>
</html>
