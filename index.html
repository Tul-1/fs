<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Go">

<title>Go</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b0b0f;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
}

.logo {
  font-size: 42px;
  font-weight: 700;
  color: white;
  margin-bottom: 24px;
}

input {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  outline: none;
  margin-bottom: 12px;
  background: #1c1c1e;
  color: white;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  background: #0a84ff;
  color: white;
  font-weight: 600;
}
</style>
</head>

<body>
<div class="container">
<div class="logo">Go</div>
<input id="url" placeholder="Enter URL or IP..." autofocus>
<button onclick="go()">Go</button>
</div>

<script>
const input = document.getElementById("url");

function go() {
  let url = input.value.trim();
  if (!url) return;

  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "http://" + url;
  }

  window.location.href = url;
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") go();
});
</script>
</body>
</html>
